# deploy/otel-collector.yaml — receives OTLP from the Go services, fans out to Tempo/Prometheus/Loki.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 20
  # DEVIATION (see Task 10 report): the pinned otelhttp v0.56.0 in the Go backend
  # emits only the LEGACY http metric "http.server.duration" (ms, label http.status_code)
  # and never the stable "http.server.request.duration" (s, label http.response.status.code)
  # that the brief's dashboard + smoke test query (its RecordMetrics hardcodes the old
  # measures; "// TODO: Duplicate Metrics"). No SDK env opt-in can produce the stable
  # metric in that version, so we normalise it here in the collector (infra-only fix):
  # rename + ms->s rescale, and mirror the status-code label to the stable key.
  #
  # REMOVE this entire processor (and revert the metrics pipeline below to
  # [memory_limiter, batch]) once the backend's otelhttp is upgraded past v0.56.0 to emit
  # "http.server.request.duration" natively — otherwise the renamed legacy metric collides
  # with the new native one (same name, mismatched attrs) and the p95/rate panels break.
  #
  # NOTE: only the metric name, unit, and status-code label are normalised to stable
  # semconv; the remaining attributes (http_method, http_scheme, net_host_name, ...)
  # intentionally stay legacy-semconv — sufficient for the dashboard contract, not a full
  # semconv migration.
  transform/http_semconv:
    metric_statements:
      - context: metric
        statements:
          - scale_metric(0.001, "s") where name == "http.server.duration"
          - set(name, "http.server.request.duration") where name == "http.server.duration"
      - context: datapoint
        statements:
          - set(attributes["http.response.status.code"], attributes["http.status_code"]) where metric.name == "http.server.request.duration" and attributes["http.status_code"] != nil
          - delete_key(attributes, "http.status_code") where metric.name == "http.server.request.duration"

exporters:
  debug:
    verbosity: basic
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true       # surface service.name etc. as metric labels for the dashboard
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  telemetry:
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform/http_semconv, batch]
      exporters: [prometheus, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/loki, debug]
