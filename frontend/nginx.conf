map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS resolver; allows nginx to start even if the
    # "api" upstream is not yet resolvable (e.g. standalone smoke-test).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # REST API -> api service (compose network hostname "api", port 8080)
    location /api/ {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket live updates -> api service
    location /ws {
        set $upstream_api http://api:8080;
        proxy_pass $upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA fallback: serve index.html for any client-side route
    location / {
        try_files $uri /index.html;
    }
}
